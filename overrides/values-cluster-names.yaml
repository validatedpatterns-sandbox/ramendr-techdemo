---
# Minimal override for DR cluster names, versions, and regions.
# This file is applied after chart defaults (override merged last). It only contains overlay keys
# (clusterOverrides, drpc) so chart regionalDR defaults are preserved.
# Also works if merged first: -f overrides/values-cluster-names.yaml -f charts/hub/rdr/values.yaml

clusterOverrides:
  primary:
    name: ocp-primary
    version: 4.22.1
    install_config:
      metadata:
        name: ocp-primary
      platform:
        aws:
          region: ca-central-1
  secondary:
    name: ocp-secondary
    version: 4.22.1
    install_config:
      metadata:
        name: ocp-secondary
      platform:
        aws:
          region: us-east-1

# DRPC preferredCluster must be the ACM ManagedCluster name (ocp-primary):
drpc:
  preferredCluster: ocp-primary
  protectedNamespaces:
    - gitops-vms
    - boutique

# Set this to "true", provision clusters, and add their kubeconfigs
# as described in the values-secret template; then run
# ./pattern.sh make install-byoc.
# That target will run a validation play to ensure the cluster
# setup will work with ramen patterns
byoc: false
